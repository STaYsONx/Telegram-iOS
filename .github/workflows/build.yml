name: Build Telegram iOS Simulator

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Set active Xcode path
      run: |
        XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
        sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer
        xcodebuild -version

    - name: Cache Bazel
      uses: actions/cache@v4
      with:
        path: ~/telegram-bazel-cache
        key: ${{ runner.os }}-telegram-bazel-${{ hashFiles('**/versions.json') }}

    - name: Create canonical source directory
      run: |
        sudo mkdir -p /Users/Shared
        cp -R $GITHUB_WORKSPACE /Users/Shared/
        mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

    - name: Build for Simulator (NO SIGNING)
      run: |
        set -x
        SOURCE_DIR=/Users/Shared/telegram-ios
        BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
        
        cd $SOURCE_DIR
        
        # Build number для стабильности
        BUILD_NUMBER_OFFSET=0
        COMMIT_COUNT=$(git rev-list --count HEAD)
        BUILD_NUMBER=$((COMMIT_COUNT + BUILD_NUMBER_OFFSET))
        export BUILD_NUMBER
        
        # Simulator-only build без подписи
        python3 build-system/Make/Make.py \
          --bazelUserRoot="$BAZEL_USER_ROOT" \
          --cacheDir="$HOME/telegram-bazel-cache" \
          build \
          --configurationPath="build-system/template_minimal_development_configuration.json" \
          --disableProvisioningProfiles \
          --configuration=debug \
          --targetPlatform=ios_simulator \
          --buildNumber="$BUILD_NUMBER"

    - name: Collect Simulator Artifacts
      run: |
        SOURCE_DIR=/Users/Shared/telegram-ios
        OUTPUT_PATH="build/artifacts-simulator"
        rm -rf "$OUTPUT_PATH"
        mkdir -p "$OUTPUT_PATH"
        
        # Ищем simulator builds
        find bazel-out/ -name "Telegram.app" -path "*/iphoneos-simulator-*" -exec cp -R {} $OUTPUT_PATH/ \;
        find bazel-out/ -name "*.dSYM" -path "*/iphoneos-simulator-*" -exec cp -R {} $OUTPUT_PATH/ \;
        
        # Zip для удобства
        zip -r "$OUTPUT_PATH/Telegram-iOS-Simulator.zip" $OUTPUT_PATH/* 1>/dev/null || true

    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: telegram-ios-simulator-${{ github.run_number }}
        path: build/artifacts-simulator/
        retention-days: 30
