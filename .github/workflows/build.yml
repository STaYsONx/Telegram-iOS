name: Build Telegram iOS Simulator

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        # УБИРАЕМ fetch-depth или делаем fetch-depth: 0 для полного клона
        fetch-depth: 0  # ← вот это исправление!

    - name: Fix submodules (if needed)
      run: |
        git submodule foreach --recursive git fetch origin
        git submodule update --init --recursive --force

    - name: Set active Xcode path
      run: |
        XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
        sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer
        xcodebuild -version

    - name: Cache Bazel
      uses: actions/cache@v4
      with:
        path: ~/telegram-bazel-cache
        key: ${{ runner.os }}-telegram-bazel-${{ hashFiles('**/versions.json') }}

    - name: Create canonical source directory
      run: |
        sudo mkdir -p /Users/Shared
        cp -R $GITHUB_WORKSPACE /Users/Shared/
        mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

    - name: Build for Simulator (NO SIGNING)
      run: |
        set -x
        SOURCE_DIR=/Users/Shared/telegram-ios
        cd $SOURCE_DIR
        
        # Simulator build
        python3 build-system/Make/Make.py \
          --cacheDir="$HOME/telegram-bazel-cache" \
          generateProject \
          --configurationPath="build-system/template_minimal_development_configuration.json" \
          --disableProvisioningProfiles \
          --overrideXcodeVersion

        # Build simulator app
        xcodebuild \
          -project Telegram.xcodeproj \
          -scheme Telegram \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          build

    - name: Collect Artifacts
      run: |
        find ~/Library/Developer/Xcode/DerivedData -name "Telegram.app" -path "*/Debug-iphonesimulator/*" | head -1 | xargs -I {} cp -R {} build/artifacts/
        zip -r build/artifacts/Telegram-Simulator.zip build/artifacts/Telegram.app

    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: telegram-ios-simulator-${{ github.run_number }}
        path: build/artifacts/
