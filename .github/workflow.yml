name: Build Telegram iOS Simulator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/telegram-bazel-cache
          key: ${{ runner.os }}-telegram-bazel-${{ hashFiles('**/versions.json') }}

      - name: Generate Xcode project
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            generateProject \
            --configurationPath=build-system/template_minimal_development_configuration.json \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles \
            --overrideXcodeVersion

      - name: Build for simulator
        run: |
          xcodebuild \
            -project Telegram.xcodeproj \
            -scheme Telegram \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-ios-simulator-build
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*
